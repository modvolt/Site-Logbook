# Stavba — full self-hosted stack (PostgreSQL + MinIO + API + Web).
#
# Local quick start:
#   cp .env.example .env   # then edit the secrets
#   docker compose up --build
#   open http://localhost:8080
#
# On Coolify, point a "Docker Compose" resource at this file and supply the same
# variables through the Coolify environment UI. See DEPLOYMENT.md.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    # Exposed so the browser can PUT uploads directly via presigned URLs.
    # S3_PUBLIC_ENDPOINT must match how the browser reaches this port.
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  # One-shot init job: create the bucket, then exit 0. Gates the API so storage
  # is ready before it starts.
  #
  # restart: "no" is REQUIRED on Coolify. A one-shot container with any other
  # restart policy is treated as a long-running service that "keeps stopping",
  # and Coolify's post-deploy monitor then inspects a container that has already
  # exited/been recreated, surfacing the "No such container" deploy failure.
  # Pinning restart to "no" keeps it in a stable Exited(0) state so the API's
  # service_completed_successfully gate can read it.
  createbuckets:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    # Wait for MinIO to accept connections, create the bucket idempotently
    # (--ignore-existing => existing bucket is NOT an error), then exit 0.
    # set -e makes a genuine bucket-creation failure (e.g. bad credentials) exit
    # non-zero so the API gate is not satisfied, instead of silently passing.
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/\"$$S3_BUCKET\";
      echo 'bucket ready';
      "

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      # Object storage. The API reaches MinIO over the internal network, while
      # the browser uses S3_PUBLIC_ENDPOINT for presigned uploads.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      # SMTP (optional — email features are disabled until configured).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}

  web:
    build:
      context: .
      dockerfile: artifacts/stavba/Dockerfile
      args:
        BASE_PATH: /
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NGINX_PORT: 80
      API_UPSTREAM: http://api:5000
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  pgdata:
  miniodata:
