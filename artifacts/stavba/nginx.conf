# Rendered at container startup via envsubst (${NGINX_PORT}, ${API_UPSTREAM}).
# nginx runtime variables ($uri, $host, …) are left untouched because they are
# not present in the environment.

# Preserve the original scheme across the proxy chain. On Coolify the public TLS
# is terminated by an upstream proxy (Traefik/Caddy) that forwards to this nginx
# over plain HTTP; it sets X-Forwarded-Proto: https. We must pass that THROUGH to
# the API (not override it with the internal $scheme=http), otherwise Express
# sees an "insecure" request and refuses to send the Secure session cookie — the
# user appears logged in but the next request is unauthenticated. Falls back to
# $scheme when no upstream proxy header is present (e.g. local docker compose).
# This map sits at http context (conf.d/*.conf is included inside http {}).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen ${NGINX_PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the service worker or the app shell, so clients pick up new
    # deploys immediately; hashed assets under /assets are safe to cache hard.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Same-origin reverse proxy to the API service. The /api prefix is preserved
    # because proxy_pass has no path component.
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 120s;
        # Photo/document uploads are now proxied THROUGH the API (POST
        # /api/storage/uploads), so the raw file bytes pass through this nginx.
        # Keep this at/above the server's MAX_UPLOAD_BYTES (100 MB) or large
        # photos are rejected here with an HTML 413 before reaching the API.
        client_max_body_size 100m;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
