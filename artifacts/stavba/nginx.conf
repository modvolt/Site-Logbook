# Rendered at container startup via envsubst (${NGINX_PORT}, ${API_UPSTREAM}).
# nginx runtime variables ($uri, $host, …) are left untouched because they are
# not present in the environment.
server {
    listen ${NGINX_PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the service worker or the app shell, so clients pick up new
    # deploys immediately; hashed assets under /assets are safe to cache hard.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Same-origin reverse proxy to the API service. The /api prefix is preserved
    # because proxy_pass has no path component.
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Allow larger JSON payloads (e.g. PDF email requests); binary uploads
        # go directly to object storage, not through this proxy.
        client_max_body_size 25m;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
