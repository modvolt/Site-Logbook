    WarehouseSummary:
      type: object
      required: [stockValue, itemCount, itemsBelowMin, itemsWithoutPrice, itemsWithNoPriceAtAll, movementsToday, waitingForInvoice, itemsMissingCostPrice]
      properties:
        stockValue:
          type: number
          description: Total value of stock (quantity * purchasePrice)
        itemCount:
          type: integer
          description: Total number of warehouse items
        itemsBelowMin:
          type: integer
          description: Items where quantity <= minQuantity
        itemsWithoutPrice:
          type: integer
          description: Items without a current purchase price (may still have price history)
        itemsWithNoPriceAtAll:
          type: integer
          description: Items with no current purchase price AND no price history at all
        movementsToday:
          type: integer
          description: Number of stock movements recorded today
        waitingForInvoice:
          type: integer
          description: Pending billing documents with stock-allocated lines
        itemsMissingCostPrice:
          type: integer
          description: Items that have at least one OUT movement without a costPriceAtTime recorded

    WarehouseJobMarginSummary:
      type: object
      required: [jobId, totalQtyOut, totalSaleValue, totalCostValue, coveredQtyOut, coveredCostQtyOut]
      properties:
        jobId:
          type: integer
        totalQtyOut:
          type: number
          description: Total quantity issued (OUT) for this job
        totalSaleValue:
          type: number
          description: Sum of (unitPrice × quantity) for OUT movements that have a sale price
        totalCostValue:
          type: number
          description: Sum of (costPriceAtTime × quantity) for OUT movements that have a cost price
        coveredQtyOut:
          type: number
          description: Qty issued where unitPrice is known (used to compute sale coverage)
        coveredCostQtyOut:
          type: number
          description: Qty issued where costPriceAtTime is known (used to compute cost coverage)
        marginPercent:
          type: ["number", "null"]
          description: "(totalSaleValue − totalCostValue) / totalSaleValue × 100, null when totalSaleValue = 0"

    WarehouseJobsMarginSummary:
      type: object
      required: [items, alertThresholdPercent]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WarehouseJobMarginSummary"
        alertThresholdPercent:
          type: number
          description: Operator-configured margin warning threshold in percent; a job is flagged low-margin when its cumulative margin drops below this value

    WarehouseJobMarginTrendPoint:
      type: object
      required: [period, cumulativeSaleValue, cumulativeCostValue]
      properties:
        period:
          type: string
          description: ISO date of the start of the week bucket (YYYY-MM-DD)
        cumulativeSaleValue:
          type: number
          description: Running total of sale value up to and including this period
        cumulativeCostValue:
          type: number
          description: Running total of cost value up to and including this period
        cumulativeMarginPct:
          type: ["number", "null"]
          description: "(cumulativeSaleValue − cumulativeCostValue) / cumulativeSaleValue × 100, null when cumulativeSaleValue = 0"

