components:
  schemas:
    ClientErrorInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 2000
        stack:
          type: ["string", "null"]
          maxLength: 10000
        componentStack:
          type: ["string", "null"]
          maxLength: 10000
        path:
          type: ["string", "null"]
