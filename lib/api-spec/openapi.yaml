          type: ["integer", "null"]
          description: For service_call jobs — auto-create next occurrence this many days after completion
        timerStartedAt:
          type: ["string", "null"]
          description: ISO timestamp when timer was started
        sortOrder:
          type: integer
          description: Manual ordering within a day (lower shows first)
        taskCount:
          type: integer
        taskDoneCount:
          type: integer
        attachmentCount:
          type: integer
        materialCount:
          type: integer
        materialTotalCost:
          type: ["number", "null"]
          description: Sum of (quantity * pricePerUnit) for all materials on the job; null if no priced materials
        billingLinked:
          type: boolean
          description: True when the job is linked to at least one non-cancelled invoice
