  /client-errors:
    post:
      operationId: reportClientError
      tags: [client-errors]
      summary: Report a frontend crash from the error boundary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientErrorInput"
      responses:
        "204":
          description: Recorded
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "429":
          description: Rate limited
    get:
      operationId: listClientErrors
      tags: [client-errors]
      summary: List recent client-side crashes (admin)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
        - name: since
          in: query
          required: false
          schema:
            type: string
            description: ISO datetime string; only return errors at or after this timestamp
      responses:
        "200":
          description: Paginated list of client errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientErrorList"
