    RiskSummary:
      type: object
      description: All cross-domain risk metrics computed in one request.
      required:
        - readyToBill
        - documentsForReview
        - warehouseBelowMin
        - jobsWithoutCustomer
        - materialsWithoutPrice
        - longInProgress
        - documentsWithoutJob
        - machinesInspectionExpired
        - machinesInspectionSoon
        - overdueUnbilledCustomers
        - staleDays
        - computedAt
      properties:
        readyToBill:
          $ref: "#/components/schemas/RiskMetric"
          description: Done jobs not yet linked to a non-cancelled invoice.
        documentsForReview:
          $ref: "#/components/schemas/RiskMetric"
          description: Billing documents with status needs_review.
        warehouseBelowMin:
          $ref: "#/components/schemas/RiskMetric"
          description: Warehouse items whose quantity is below their configured minimum.
        jobsWithoutCustomer:
          $ref: "#/components/schemas/RiskMetric"
          description: Active (planned/in_progress) jobs without an assigned customer.
        materialsWithoutPrice:
          $ref: "#/components/schemas/RiskMetric"
          description: Job materials without a unit price.
        longInProgress:
          $ref: "#/components/schemas/RiskMetric"
          description: Jobs that have been in_progress for more than staleDays days.
        documentsWithoutJob:
          $ref: "#/components/schemas/RiskMetric"
          description: Cost documents in a reviewable status with no job link and no confirmed reference.
        machinesInspectionExpired:
          $ref: "#/components/schemas/RiskMetric"
          description: Machines whose inspection date has passed.
        machinesInspectionSoon:
          $ref: "#/components/schemas/RiskMetric"
          description: Machines whose inspection date falls within the next 30 days.
        overdueUnbilledCustomers:
          $ref: "#/components/schemas/RiskMetric"
          description: Customers with at least one done unbilled job older than 7 days.
        staleDays:
          type: integer
          description: The staleness threshold (days) used for this response.
        computedAt:
          type: string
          description: ISO timestamp when this summary was computed.

