    delete:
      operationId: revokePpeSignToken
      tags: [ppe]
      summary: Revoke the signature link for an assignment so the token is no longer valid (admin/master)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Token revoked (or was already absent)
        "404":
          description: Not found
        "403":
          description: Forbidden

  /ppe/assignments/{id}:
    delete:
      operationId: deletePpeAssignment
      tags: [ppe]
      summary: Hard-delete a PPE assignment record (admin/master)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "403":
          description: Forbidden
    patch:
      operationId: updatePpeAssignment
      tags: [ppe]
      summary: Update a PPE assignment — return, status change, date edit (admin/master)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PpeAssignmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PpeAssignment"
        "404":
          description: Not found
        "409":
          description: Conflict — assignment is confirmed by employee and only status/returned_at can change
