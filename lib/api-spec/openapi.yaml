openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Stavba Job Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admin
    description: Admin-only system diagnostics and operational health
  - name: jobs
    description: Job/order management
  - name: tasks
    description: Tasks and checklists per job
  - name: attachments
    description: Attachments per job
  - name: materials
    description: Material/supply lists per job
  - name: people
    description: People / assigned workers
  - name: customers
    description: Customer companies
  - name: dashboard
    description: Dashboard summaries
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: StorageUpload
    description: |
      Binary file upload through the API server. Excluded from the generated
      React Query client (Orval cannot emit a raw-binary request body — it
      JSON.stringifies anything that isn't form-data/text), so the typed client
      would corrupt uploads. The hand-written `useUpload` hook posts raw bytes
      to this endpoint instead. The zod response schema is still generated.
  - name: auth
    description: Authentication and session management
  - name: users
    description: User management (admin)
  - name: activities
    description: Long-term activities with timers and materials
  - name: me
    description: Current user's overview and statistics
  - name: visits
    description: Technician site visits attached to a job
  - name: machines
    description: Machine/equipment registry with QR identification
  - name: warehouse
    description: Warehouse / inventory items
  - name: audit
    description: Audit log of data changes (admin)
  - name: gdpr
    description: GDPR data subject export and erasure (admin)
  - name: client-errors
  - name: risks
    description: Cross-domain risk metrics and work-queue summaries
  - name: ppe
    description: Personal protective equipment (OOPP) catalogue and issue tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/health:
    get:
      operationId: getAdminHealth
      tags: [admin]
      summary: Operational health and build diagnostics (admin only)
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminHealthStatus"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs, optionally filtered by date range
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD)
        - name: to
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD)
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: assignedPersonId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: segment
          in: query
          required: false
          description: |
            Work-queue segment filter. Mutually exclusive with `status`.
            - `in_progress` — status = in_progress
            - `ready_to_bill` — status = done AND not linked to an active invoice
            - `problematic` — active jobs missing customer, price, or stale in_progress
            - `without_customer` — planned/in_progress without a customer
            - `without_price` — planned/in_progress without a price
            - `cancelled` — status = cancelled
          schema:
            type: string
            enum:
              - in_progress
              - ready_to_bill
              - problematic
              - without_customer
              - without_price
              - cancelled
        - name: staleDays
          in: query
          required: false
          description: "For segment=problematic (and the risk summary): number of days in_progress before a job is considered stale (default 14)."
          schema:
            type: integer
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/reorder:
    patch:
      operationId: reorderJobs
      tags: [jobs]
      summary: Reorder jobs by setting sortOrder from the given id order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobReorderInput"
      responses:
        "204":
          description: Reordered

  /jobs/status:
    patch:
      operationId: bulkUpdateJobStatus
      tags: [jobs]
      summary: Bulk-update status on multiple jobs (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobBulkStatusUpdate"
      responses:
        "200":
          description: Number of jobs updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUpdateResult"
        "400":
          description: Validation error

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /jobs/{id}/status:
    patch:
      operationId: updateJobStatus
      tags: [jobs]
      summary: Quick-update job status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobStatusUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/send-email:
    post:
      operationId: sendJobEmail
      tags: [jobs]
      summary: Email the job sheet PDF to the customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendJobEmailInput"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendJobEmailResult"

  /jobs/{id}/job-sheet:
    post:
      operationId: saveJobSheet
      tags: [jobs]
      summary: Save the (signed) job sheet PDF as an attachment of the job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveJobSheetInput"
      responses:
        "201":
          description: Saved job sheet attachment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"

  /jobs/{jobId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /jobs/{jobId}/tasks/{taskId}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task (e.g. toggle done)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{jobId}/materials:
    get:
      operationId: listMaterials
      tags: [materials]
      summary: List materials for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
    post:
      operationId: createMaterial
      tags: [materials]
      summary: Add a material to a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /jobs/{jobId}/materials/{materialId}:
    patch:
      operationId: updateMaterial
      tags: [materials]
      summary: Update a material item
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: materialId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
    delete:
      operationId: deleteMaterial
      tags: [materials]
      summary: Delete a material item
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: materialId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /materials/linkable-document-lines:
    get:
      operationId: listLinkableDocumentLines
      tags: [materials]
      summary: Search approved billing-document lines available for manual linking
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Free-text search across description, supplier name and document number
      responses:
        "200":
          description: Matching approved lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkableBillingDocumentLine"

  /materials/{materialId}/link-document:
    patch:
      operationId: linkMaterialToDocument
      tags: [materials]
      summary: Link or unlink a job material to a billing-document line (admin only)
      parameters:
        - name: materialId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialLinkDocumentInput"
      responses:
        "200":
          description: Updated material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /jobs/{jobId}/attachments:
    get:
      operationId: listAttachments
      tags: [attachments]
      summary: List attachments for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
    post:
      operationId: createAttachment
      tags: [attachments]
      summary: Add an attachment to a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"

  /jobs/{jobId}/attachments/{attachmentId}:
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /people:
    get:
      operationId: listPeople
      tags: [people]
      summary: List all people
      responses:
        "200":
          description: People
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Person"
    post:
      operationId: createPerson
      tags: [people]
      summary: Create a person
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"

  /people/stats:
    get:
      operationId: getPeopleStats
      tags: [people]
      summary: Operational stats per person — today's jobs, week hours, machines, active timer
      responses:
        "200":
          description: Stats per person
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonStats"

  /people/active-timers:
    get:
      operationId: getActiveTimers
      tags: [people]
      summary: List all currently running timers across the team
      responses:
        "200":
          description: Active timers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveTimer"

  /people/{id}:
    get:
      operationId: getPerson
      tags: [people]
      summary: Get a person by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Not found
    patch:
      operationId: updatePerson
      tags: [people]
      summary: Update a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
    delete:
      operationId: deletePerson
      tags: [people]
      summary: Delete a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leaves:
    get:
      operationId: listLeaves
      tags: [people]
      summary: List employee leaves, optionally filtered by person / date range
      parameters:
        - name: personId
          in: query
          required: false
          schema:
            type: integer
        - name: from
          in: query
          required: false
          schema:
            type: string
            description: ISO date YYYY-MM-DD
        - name: to
          in: query
          required: false
          schema:
            type: string
            description: ISO date YYYY-MM-DD
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [vacation, sick, other]
      responses:
        "200":
          description: List of leaves
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeLeave"
    post:
      operationId: createLeave
      tags: [people]
      summary: Create an employee leave record (admin/master)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeLeaveInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeLeave"
        "400":
          description: Validation error
        "404":
          description: Person not found

  /leaves/{id}:
    put:
      operationId: updateLeave
      tags: [people]
      summary: Update an employee leave record (admin/master)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeLeaveInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeLeave"
        "404":
          description: Not found
    delete:
      operationId: deleteLeave
      tags: [people]
      summary: Delete an employee leave record (admin/master)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /leaves/export:
    get:
      operationId: exportLeaves
      tags: [people]
      summary: Export yearly leave summary as CSV or PDF (admin/master)
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
            description: Year (defaults to current year)
        - name: personId
          in: query
          required: false
          schema:
            type: integer
            description: Filter to a single person
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv, pdf]
            default: csv
      responses:
        "200":
          description: File download (CSV or PDF)
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Person not found

  /leaves/summary:
    get:
      operationId: getLeavesSummary
      tags: [people]
      summary: Aggregated leave days per person for a given year
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
            description: Year (defaults to current year)
      responses:
        "200":
          description: Summary per person
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveSummary"

  /leaves/settings:
    get:
      operationId: getLeaveSettings
      tags: [people]
      summary: Get configurable annual leave caps per type (admin/master)
      responses:
        "200":
          description: Current leave settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveSettings"
    put:
      operationId: updateLeaveSettings
      tags: [people]
      summary: Update annual leave caps per type (admin/master)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveSettings"
        "400":
          description: Validation error

  /public-holidays:
    get:
      operationId: listPublicHolidays
      tags: [people]
      summary: List Czech public holidays for a given year
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
            description: Year (defaults to current year)
      responses:
        "200":
          description: Public holidays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicHoliday"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/import:
    post:
      operationId: importCustomers
      tags: [customers]
      summary: Bulk import (upsert) customers from a CSV file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerImportInput"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerImportResult"

  /customers/{id}:
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /customers/{id}/financial-summary:
    get:
      operationId: getCustomerFinancialSummary
      tags: [customers]
      summary: Financial snapshot for a customer (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerFinancialSummary"
        "404":
          description: Not found

  /customers/{id}/send-credentials-email:
    post:
      operationId: sendCredentialsEmail
      tags: [customers]
      summary: Email the access-credentials PDF to the customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCredentialsEmailInput"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendJobEmailResult"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Aggregated statistics for a date range (admin only)
      parameters:
        - name: from
          in: query
          required: true
          schema:
