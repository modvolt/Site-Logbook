        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    PpeItemInput:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          enum: [hlava, ruky, telo, nohy, oci, sluch, dychaci, ostatni]
        description:
          type: ["string", "null"]
        defaultReplacementMonths:
          type: ["integer", "null"]
        defaultInspectionMonths:
          type: ["integer", "null"]
        active:
          type: boolean
        notes:
          type: ["string", "null"]

    PpeAssignment:
      type: object
      required: [id, ppeItemId, personId, ppeNameSnapshot, personNameSnapshot, quantity, issuedAt, status, createdAt, hasConfirmToken]
      properties:
        id:
          type: integer
        ppeItemId:
          type: integer
        personId:
          type: integer
        ppeNameSnapshot:
          type: string
        personNameSnapshot:
          type: string
        ppeCategorySnapshot:
          type: ["string", "null"]
        ppeStandardSnapshot:
          type: ["string", "null"]
        ppeProtectionClassSnapshot:
          type: ["string", "null"]
        ppeRiskDescriptionSnapshot:
          type: ["string", "null"]
        quantity:
          type: integer
        size:
          type: ["string", "null"]
        serialNumber:
          type: ["string", "null"]
        issuedAt:
          type: string
        replaceBy:
          type: ["string", "null"]
        nextInspectionAt:
          type: ["string", "null"]
        returnedAt:
          type: ["string", "null"]
        status:
          type: string
          enum: [issued, returned, damaged, lost, disposed]
        employeeConfirmedAt:
          type: ["string", "null"]
        hasConfirmToken:
          type: boolean
          description: True when a confirmation link has been generated for this assignment
        hasSignToken:
          type: boolean
          description: True when an active signature link exists for this assignment
        confirmEmailSentAt:
          type: ["string", "null"]
          description: ISO timestamp when the confirmation link was emailed to the employee
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        handoverDocument:
          anyOf:
            - $ref: "#/components/schemas/PpeHandoverDocument"
            - type: "null"

    PpeConfirmLinkResponse:
      type: object
      required: [confirmUrl, token, emailSent]
      properties:
        confirmUrl:
          type: string
          description: Full URL the employee opens to confirm receipt
        token:
          type: string
        emailSent:
          type: boolean
          description: True when the confirmation link was successfully emailed to the employee

    PpeConfirmInput:
      type: object
      required: [token]
      properties:
