          confidenceThreshold,
          systemPrompt,
          defaultSystemPrompt,
          source,
        ]
      properties:
        configured:
          type: boolean
        enabled:
          type: boolean
        ready:
          type: boolean
        model:
          type: string
        maxFileMb:
          type: number
        requestTimeoutMs:
          type: number
        confidenceThreshold:
          type: number
          description: Below this overall confidence (0–1) a result is flagged for review.
        systemPrompt:
          type: string
          description: The active system prompt that instructs the model how to read documents.
        defaultSystemPrompt:
          type: string
          description: The built-in default system prompt, so the UI can offer a reset to the latest default rules.
        source:
          type: string
          enum: [db, env, none]
          description: >-
            Which source provides the API key: "db" (saved in Settings), "env"
            (OPENAI_API_KEY fallback), or "none".

    DocumentExtractionInput:
      type: object
      required: [enabled, model]
      properties:
        enabled:
          type: boolean
        model:
          type: ["string", "null"]
        systemPrompt:
          type: ["string", "null"]
          description: >-
            Instructions for the model. An empty string / null resets it to the
            built-in default prompt.
        maxFileMb:
          type: ["number", "null"]
          description: Max upload size sent to OpenAI; null falls back to env/default.
        requestTimeoutMs:
          type: ["number", "null"]
          description: Per-request timeout in ms; null falls back to env/default.
        confidenceThreshold:
          type: ["number", "null"]
          description: Review threshold (0–1); null falls back to env/default.
        apiKey:
          type: ["string", "null"]
          description: >-
            Write-only. A non-empty string sets the OpenAI API key, an empty
            string clears it, and omitting / null keeps the existing key.

