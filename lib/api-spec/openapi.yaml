          description: True if the assignment was already confirmed before this request
        assignment:
          $ref: "#/components/schemas/PpeAssignment"

    PpeAssignmentInput:
      type: object
      required: [ppeItemId, personId, quantity, issuedAt]
      properties:
        ppeItemId:
          type: integer
        personId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        size:
          type: ["string", "null"]
        serialNumber:
          type: ["string", "null"]
        issuedAt:
          type: string
        replaceBy:
          type: ["string", "null"]
        nextInspectionAt:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    PpeAssignmentUpdate:
