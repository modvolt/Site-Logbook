      responses:
        "200":
          description: Confirmed (or already confirmed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PpeConfirmResult"
        "400":
          description: Missing token
        "404":
          description: Invalid or expired token
        "409":
          description: Assignment is no longer active

