components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Customer:
      type: object
      required: [id, companyName, createdAt]
      properties:
        id:
          type: integer
        companyName:
          type: string
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        ic:
          type: ["string", "null"]
        dic:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        createdAt:
          type: string

    SendJobEmailInput:
      type: object
      required: [pdfBase64]
      properties:
        pdfBase64:
          type: string
          description: Base64-encoded PDF of the job sheet
        to:
          type: ["string", "null"]
          description: Optional override recipient; defaults to the customer's stored email
        subject:
          type: ["string", "null"]
        message:
          type: ["string", "null"]

    SendJobEmailResult:
      type: object
      required: [sent, to]
      properties:
        sent:
          type: boolean
        to:
          type: string

    CustomerInput:
      type: object
      required: [companyName]
      properties:
        companyName:
          type: string
          minLength: 1
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        ic:
          type: ["string", "null"]
        dic:
          type: ["string", "null"]
        address:
          type: ["string", "null"]

    CustomerContact:
      type: object
      required: [id, customerId, name, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        name:
          type: string
        role:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        createdAt:
          type: string

    CustomerContactInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]

    CustomerSite:
      type: object
      required: [id, customerId, name, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        name:
          type: string
        address:
          type: ["string", "null"]
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        createdAt:
          type: string

    CustomerSiteInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: ["string", "null"]
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    DeviceCredential:
      type: object
      required: [id, customerId, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        siteId:
