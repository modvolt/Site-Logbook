          type: string
          enum: [time_material, fixed_price]
          description: "time_material: bill materials + job price; fixed_price: bill a single agreed-upon line at contractPrice"
        contractPrice:
          type: ["number", "null"]
          description: Agreed-upon fixed price (only used when pricingMode = 'fixed_price')
        createdAt:
          type: string

