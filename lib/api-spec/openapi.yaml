  /billing/documents/upload:
    post:
      operationId: uploadCostDocument
      tags: [CostDocumentUpload]
      summary: Upload a received cost document's bytes (admin only)
      description: |
        Raw file bytes in the body; metadata as query params. The server hashes,
        de-duplicates and (for ISDOC/XML) parses the document, then enqueues an
        extraction job. Returns 409 with the matching documents when a probable
        duplicate is found, unless `force=true`.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: contentType
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: docType
          in: query
          required: false
          schema:
            type: string
            enum: [receipt, delivery_note, invoice, credit_note]
        - name: jobId
          in: query
          required: false
          schema:
            type: integer
        - name: customerId
          in: query
          required: false
          schema:
            type: integer
        - name: force
          in: query
          required: false
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Document stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostDocumentDetail"
        "409":
          description: Probable duplicate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostDocumentDuplicateConflict"
        "400":
          description: Missing file content
