      operationId: requestPpeConfirm
      tags: [ppe]
      summary: Generate (or re-use) a confirmation link for an issued PPE assignment (admin/master)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmation URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PpeConfirmLinkResponse"
        "404":
          description: Not found
        "409":
          description: Assignment already confirmed or not in issued state
        "403":
          description: Forbidden

  /ppe/confirm:
    get:
      operationId: getPpeConfirmDetails
      tags: [ppe]
      summary: Fetch assignment details by confirmation token (public)
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Assignment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PpeAssignment"
        "400":
          description: Missing token
        "404":
          description: Invalid or expired token
