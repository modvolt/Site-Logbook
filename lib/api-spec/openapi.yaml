openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Stavba Job Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Job/order management
  - name: tasks
    description: Tasks and checklists per job
  - name: attachments
    description: Attachments per job
  - name: materials
    description: Material/supply lists per job
  - name: people
    description: People / assigned workers
  - name: customers
    description: Customer companies
  - name: dashboard
    description: Dashboard summaries
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: auth
    description: Authentication and session management
  - name: users
    description: User management (admin)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs, optionally filtered by date range
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD)
        - name: to
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD)
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: assignedPersonId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /jobs/{id}/status:
    patch:
      operationId: updateJobStatus
      tags: [jobs]
      summary: Quick-update job status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobStatusUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{jobId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /jobs/{jobId}/tasks/{taskId}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task (e.g. toggle done)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{jobId}/materials:
    get:
      operationId: listMaterials
      tags: [materials]
      summary: List materials for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
    post:
      operationId: createMaterial
      tags: [materials]
      summary: Add a material to a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /jobs/{jobId}/materials/{materialId}:
    patch:
      operationId: updateMaterial
      tags: [materials]
      summary: Update a material item
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: materialId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
    delete:
      operationId: deleteMaterial
      tags: [materials]
      summary: Delete a material item
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: materialId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{jobId}/attachments:
    get:
      operationId: listAttachments
      tags: [attachments]
      summary: List attachments for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
    post:
      operationId: createAttachment
      tags: [attachments]
      summary: Add an attachment to a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"

  /jobs/{jobId}/attachments/{attachmentId}:
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /people:
    get:
      operationId: listPeople
      tags: [people]
      summary: List all people
      responses:
        "200":
          description: People
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Person"
    post:
      operationId: createPerson
      tags: [people]
      summary: Create a person
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"

  /people/{id}:
    patch:
      operationId: updatePerson
      tags: [people]
      summary: Update a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
    delete:
      operationId: deletePerson
      tags: [people]
      summary: Delete a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/today:
    get:
      operationId: getTodayJobs
      tags: [dashboard]
      summary: Get today's jobs
      responses:
        "200":
          description: Today's jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current authenticated user (or setup info)
      responses:
        "200":
          description: Current user state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /auth/setup:
    post:
      operationId: setupFirstAdmin
      tags: [auth]
      summary: Create the very first admin user (only allowed when no users exist)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInput"
      responses:
        "201":
          description: First admin created and signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Customer:
      type: object
      required: [id, companyName, createdAt]
      properties:
        id:
          type: integer
        companyName:
          type: string
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        createdAt:
          type: string

    CustomerInput:
      type: object
      required: [companyName]
      properties:
        companyName:
          type: string
          minLength: 1
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]

    Job:
      type: object
      required: [id, title, type, date, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          description: "site_visit | consultation | planned_work | service_call | change | other"
        clientSite:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
          description: Physical address for navigation (Waze/Maps)
        date:
          type: string
          description: ISO date (YYYY-MM-DD)
        startTime:
          type: ["string", "null"]
          description: "HH:MM"
        endTime:
          type: ["string", "null"]
          description: "HH:MM"
        status:
          type: string
          description: "planned | in_progress | done | cancelled"
        assignedPersonId:
          type: ["integer", "null"]
        assignedPersonName:
          type: ["string", "null"]
        customerId:
          type: ["integer", "null"]
        customerCompanyName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        hoursSpent:
          type: ["number", "null"]
        hoursVasek:
          type: ["number", "null"]
        hoursJonas:
          type: ["number", "null"]
        price:
          type: ["number", "null"]
        transportKm:
          type: ["number", "null"]
        transportCost:
          type: ["number", "null"]
        fines:
          type: ["number", "null"]
        parking:
          type: ["number", "null"]
        timerStartedAt:
          type: ["string", "null"]
          description: ISO timestamp when timer was started
        taskCount:
          type: integer
        taskDoneCount:
          type: integer
        attachmentCount:
          type: integer
        materialCount:
          type: integer
        createdAt:
          type: string

    JobInput:
      type: object
      required: [title, type, date, status]
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
        clientSite:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        date:
          type: string
        startTime:
          type: ["string", "null"]
        endTime:
          type: ["string", "null"]
        status:
          type: string
        assignedPersonId:
          type: ["integer", "null"]
        customerId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        hoursSpent:
          type: ["number", "null"]
        hoursVasek:
          type: ["number", "null"]
        hoursJonas:
          type: ["number", "null"]
        price:
          type: ["number", "null"]
        transportKm:
          type: ["number", "null"]
        transportCost:
          type: ["number", "null"]
        fines:
          type: ["number", "null"]
        parking:
          type: ["number", "null"]

    JobUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
        clientSite:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        date:
          type: string
        startTime:
          type: ["string", "null"]
        endTime:
          type: ["string", "null"]
        status:
          type: string
        assignedPersonId:
          type: ["integer", "null"]
        customerId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        hoursSpent:
          type: ["number", "null"]
        hoursVasek:
          type: ["number", "null"]
        hoursJonas:
          type: ["number", "null"]
        price:
          type: ["number", "null"]
        transportKm:
          type: ["number", "null"]
        transportCost:
          type: ["number", "null"]
        fines:
          type: ["number", "null"]
        parking:
          type: ["number", "null"]
        timerStartedAt:
          type: ["string", "null"]

    Material:
      type: object
      required: [id, jobId, name, done, sortOrder, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        name:
          type: string
        quantity:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        pricePerUnit:
          type: ["number", "null"]
        done:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string

    MaterialInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        quantity:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        pricePerUnit:
          type: ["number", "null"]

    MaterialUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        quantity:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        pricePerUnit:
          type: ["number", "null"]
        done:
          type: boolean

    JobStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Task:
      type: object
      required: [id, jobId, title, done, isChangeRequest, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        done:
          type: boolean
        isChangeRequest:
          type: boolean
          description: Marks this task as a change request / extra work
        createdAt:
          type: string

    TaskInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        isChangeRequest:
          type: boolean

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        done:
          type: boolean
        isChangeRequest:
          type: boolean

    Attachment:
      type: object
      required: [id, jobId, type, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        type:
          type: string
          description: "photo | delivery_note | receipt | invoice | manual_item"
        fileName:
          type: ["string", "null"]
        url:
          type: ["string", "null"]
          description: base64 data URL or file path
        description:
          type: ["string", "null"]
        amount:
          type: ["number", "null"]
          description: For manual items and invoices
        createdAt:
          type: string

