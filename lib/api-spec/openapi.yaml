    StatsOverview:
      type: object
      required: [from, to, jobs, revenue, employees, materials, warehouse, billing, activities, readyToBill, comparison, trend, topCustomers, ppe]
      properties:
        from:
          type: string
        to:
          type: string
        jobs:
          type: object
          required: [total, planned, inProgress, done, cancelled, totalHours, byType]
          properties:
            total:
              type: integer
            planned:
              type: integer
            inProgress:
              type: integer
            done:
              type: integer
            cancelled:
              type: integer
            totalHours:
              type: number
