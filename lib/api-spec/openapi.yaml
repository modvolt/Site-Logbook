              type: array
              items:
                $ref: "#/components/schemas/StatsJobTypeCount"
        revenue:
          type: object
          required: [work, material, total, parking, fines, transport]
          properties:
            work:
              type: number
            material:
              type: number
            total:
              type: number
            parking:
              type: number
            fines:
              type: number
            transport:
              type: number
        employees:
          type: array
          items:
            $ref: "#/components/schemas/StatsEmployee"
        materials:
          type: object
          required: [totalCost, top]
          properties:
            totalCost:
              type: number
            top:
              type: array
              items:
                $ref: "#/components/schemas/StatsMaterialRow"
        warehouse:
          type: object
          required: [itemCount, stockValue, lowStockCount, materialSaleRevenue, materialPurchaseCost, materialGrossProfit, hasPartialCosts, topProfitItems, incompleteMovements, incompleteMovementsShare]
          properties:
            itemCount:
              type: integer
            stockValue:
              type: number
            lowStockCount:
              type: integer
            materialSaleRevenue:
              type: number
            materialPurchaseCost:
              type: number
            materialGrossProfit:
              type: number
            hasPartialCosts:
              type: boolean
            topProfitItems:
              type: array
              items:
                $ref: "#/components/schemas/StatsWarehouseProfitItem"
            incompleteMovements:
              type: integer
              description: Number of OUT movements in the period with no cost_price_at_time (excluded from profit calculation)
            incompleteMovementsShare:
              type: number
              description: Fraction of OUT movements missing a cost price (0–1)
        billing:
          type: object
          required: [issuedCount, issuedWithVat, paidCount, paidAmount, toCollectCount, toCollectAmount, overdueCount, overdueAmount]
          description: Invoice/billing statistics. Issued/paid are period-bound; toCollect/overdue are current snapshots.
          properties:
            issuedCount:
              type: integer
              description: Number of invoices issued in the period
            issuedWithVat:
              type: number
              description: Sum of totalWithVat for invoices issued in the period
            paidCount:
              type: integer
              description: Number of invoices paid in the period
            paidAmount:
              type: number
              description: Sum of paid amounts for invoices paid in the period
            toCollectCount:
              type: integer
              description: Current number of issued/sent (unpaid) invoices
            toCollectAmount:
              type: number
              description: Current sum of unpaid invoice totals
            overdueCount:
              type: integer
              description: Current number of overdue invoices (past due date, still unpaid)
            overdueAmount:
              type: number
              description: Current sum of overdue invoice totals
        comparison:
          type: object
          required: [prevFrom, prevTo, revenueTotal, issuedWithVat, paid, doneJobsCount]
          description: Same metrics computed for the immediately preceding period of equal length (for KPI delta).
          properties:
            prevFrom:
              type: string
            prevTo:
              type: string
            revenueTotal:
              type: number
              description: Previous-period job work + materials value (excl. VAT)
            issuedWithVat:
              type: number
              description: Previous-period invoiced amount with VAT
            paid:
              type: number
              description: Previous-period paid amount
            doneJobsCount:
              type: integer
              description: Previous-period count of done jobs
        activities:
          type: object
          required: [readyToBillCount, readyToBillAmount]
          description: Snapshot of billable activities ready for invoicing
          properties:
            readyToBillCount:
              type: integer
              description: Count of completed activities with billingStatus=billable
            readyToBillAmount:
              type: number
              description: Total value without VAT (materials + extra works) for billable completed activities
        readyToBill:
          type: object
          required: [jobsCount, activitiesCount, count, amount]
          description: Combined ready-to-bill snapshot (done jobs + billable completed activities)
          properties:
            jobsCount:
              type: integer
              description: Count of done jobs (status=done, not yet vyfakturovano)
            activitiesCount:
              type: integer
              description: Count of billable completed activities
            count:
              type: integer
              description: Total combined count (jobs + activities)
            amount:
              type: number
              description: Total combined value without VAT (job price/transport/parking + activity materials + extra works)
        trend:
          type: array
          description: Monthly time series for the 6 months ending in the period's month
          items:
            $ref: "#/components/schemas/StatsTrendMonth"
        topCustomers:
          type: array
          description: Top customers by invoiced amount in the period
          items:
            $ref: "#/components/schemas/StatsTopCustomer"
        ppe:
          type: object
          required: [issued, signed, unsigned, overdue]
          description: Current PPE (OOPP) assignment snapshot
          properties:
            issued:
              type: integer
              description: Total active (issued) PPE assignments
            signed:
              type: integer
              description: Active assignments with employee confirmation
            unsigned:
              type: integer
              description: Active assignments without employee confirmation
            overdue:
              type: integer
              description: Active assignments past their replacement date

