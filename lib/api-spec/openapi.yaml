          type: ["number", "null"]
        hoursFromPlan:
          type: boolean
          description: True when hoursSpent was set from the planned start/end time
        hoursBeforePlan:
          type: ["number", "null"]
          description: Previous actual hoursSpent, kept so plan time can be reverted
        hoursVasek:
          type: ["number", "null"]
        hoursJonas:
          type: ["number", "null"]
        price:
          type: ["number", "null"]
